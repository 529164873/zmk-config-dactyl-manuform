# --- Wireless / Bluetooth ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Split keyboard ---
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# --- Sleep / power saving ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# --- Battery reporting (nice!nano has voltage divider) ---
CONFIG_ZMK_BATTERY_REPORTING=y

# Uncomment to enable USB logging for debugging
# CONFIG_ZMK_USB_LOGGING=y
